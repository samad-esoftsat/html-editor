// ── Build helpers ─────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

function buildUl(ulStyle, bullets) {
  const pad = '                              ';
  const items = bullets.map(b => `${pad}<li>${escHtml(b)}</li>`).join('\n\n');
  return `<ul style="${ulStyle}">\n\n${items}\n\n                            </ul>`;
}

function buildHtml() {
  let html = TEMPLATE;
  html = html.replace('%%IMG_LOGO%%',         state.global.logo);
  html = html.replace('%%IMG_COVERAGE_MAP%%', state.global.coverageMap);
  html = html.replace('%%IMG_TELEPORT%%',     state.global.teleport);
  for (const sec of state.sections) {
    html = html.replace(`%%IMG_${sec.id}%%`, sec.img);
    html = html.replace(`%%TITLE_${sec.id}%%`, escHtml(sec.title));
    html = html.replace(`%%UL_${sec.id}%%`,  buildUl(sec.ulStyle, sec.bullets));
  }
  return html;
}

// ── UI rendering ──────────────────────────────────────────────────────────────
function renderEditor() {
  let html = '';

  // Global images card (open by default)
  html += `<div class="card open">
    <div class="card-head" onclick="this.closest('.card').classList.toggle('open')">
      <span class="card-title">Header &amp; Footer Images</span>
      <span class="card-arrow">&#9660;</span>
    </div>
    <div class="card-body">
      <label>Logo URL</label>
      <input class="url-input" type="text" value="${escAttr(state.global.logo)}"
             oninput="state.global.logo=this.value; updateThumb(this); updatePreview()">
      <img class="img-thumb" src="${escAttr(state.global.logo)}" onerror="this.style.opacity='.2'" alt="">
      <label>Coverage Map URL</label>
      <input class="url-input" type="text" value="${escAttr(state.global.coverageMap)}"
             oninput="state.global.coverageMap=this.value; updateThumb(this); updatePreview()">
      <img class="img-thumb" src="${escAttr(state.global.coverageMap)}" onerror="this.style.opacity='.2'" alt="">
      <label>Footer / Teleport Image URL</label>
      <input class="url-input" type="text" value="${escAttr(state.global.teleport)}"
             oninput="state.global.teleport=this.value; updateThumb(this); updatePreview()">
      <img class="img-thumb" src="${escAttr(state.global.teleport)}" onerror="this.style.opacity='.2'" alt="">
    </div>
  </div>`;

  // Product section cards
  for (let i = 0; i < state.sections.length; i++) {
    const sec = state.sections[i];
    html += `<div class="card" id="card-${sec.id}">
      <div class="card-head" onclick="this.closest('.card').classList.toggle('open')">
        <span class="card-title" id="card-title-${sec.id}">${escHtml(sec.title)}</span>
        <span class="card-arrow">&#9660;</span>
      </div>
      <div class="card-body">
        <label>Section Title</label>
        <input class="title-input" type="text" value="${escAttr(sec.title)}"
               oninput="updateSectionTitle(${i}, this.value)">
        <label>Image URL</label>
        <input class="url-input" type="text" value="${escAttr(sec.img)}"
               oninput="state.sections[${i}].img=this.value; updateThumb(this); updatePreview()">
        <img class="img-thumb" src="${escAttr(sec.img)}" onerror="this.style.opacity='.2'" alt="">
        <label>Bullet Points</label>
        <div class="bullet-list" id="bullets-${sec.id}">
          ${sec.bullets.map((b, j) => makeBulletRow(i, j, b)).join('')}
        </div>
        <button class="btn-add" onclick="addBullet(${i})">+ Add Bullet</button>
      </div>
    </div>`;
  }

  document.getElementById('leftPanel').innerHTML = html;
}

function makeBulletRow(secIdx, bulletIdx, text) {
  return `<div class="bullet-row" id="br-${secIdx}-${bulletIdx}">
    <input class="bullet-input" type="text" value="${escAttr(text)}"
           oninput="state.sections[${secIdx}].bullets[${bulletIdx}]=this.value; updatePreview()">
    <button class="btn-del" onclick="deleteBullet(${secIdx},${bulletIdx})" title="Remove bullet">&#215;</button>
  </div>`;
}

function updateSectionTitle(secIdx, value) {
  const sec = state.sections[secIdx];
  sec.title = value;
  const cardTitle = document.getElementById(`card-title-${sec.id}`);
  if (cardTitle) cardTitle.textContent = value || 'Untitled Section';
  updatePreview();
}

function updateThumb(input) {
  const img = input.nextElementSibling;
  if (img && img.tagName === 'IMG') { img.style.opacity = '1'; img.src = input.value; }
}

function addBullet(secIdx) {
  state.sections[secIdx].bullets.push('');
  rebuildBulletList(secIdx);
  // Focus the new input
  const list = document.getElementById(`bullets-${state.sections[secIdx].id}`);
  const last = list.lastElementChild && list.lastElementChild.querySelector('input');
  if (last) last.focus();
  updatePreview();
}

function deleteBullet(secIdx, bulletIdx) {
  if (state.sections[secIdx].bullets.length <= 1) return; // keep at least 1
  state.sections[secIdx].bullets.splice(bulletIdx, 1);
  rebuildBulletList(secIdx);
  updatePreview();
}

function rebuildBulletList(secIdx) {
  const sec = state.sections[secIdx];
  const container = document.getElementById(`bullets-${sec.id}`);
  container.innerHTML = sec.bullets.map((b, j) => makeBulletRow(secIdx, j, b)).join('');
}

function updatePreview() {
  document.getElementById('previewFrame').srcdoc = buildHtml();
}

function downloadHtml() {
  const blob = new Blob([buildHtml()], { type: 'text/html;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'globaltt-email.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderEditor();
updatePreview();
</script>
