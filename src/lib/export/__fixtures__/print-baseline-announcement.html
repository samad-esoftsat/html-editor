<!doctype html>
<html lang="en">
<head>
<title>Print preview</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@page {
  size: A4 portrait;
  margin: 32mm 12mm 64mm 12mm;
  @top-center    { content: element(header-region); }
  @bottom-center { content: element(footer-region); }
}
@page :first { margin-top: 32mm; }
.print-footer { font-size: 13px; line-height: 1.4; }
.print-footer .print-footer-banner { display: block; width: 100%; max-width: 710px; height: 60px; object-fit: cover; margin: 0 auto 6px; }

* { box-sizing: border-box; }
body { margin: 0; padding: 0; }

.running-header { position: running(header-region); }
.running-footer { position: running(footer-region); }
.running-header, .running-footer { display: none; }

.print-block {
  break-inside: avoid;
  page-break-inside: avoid;
  margin: 0 auto;
  max-width: 710px;
}

main { width: 100%; }
body { font-family: Arial, Helvetica Neue, Helvetica, sans-serif; font-size: 16px; color: #1c1c1c; background: #ffffff; }
.pagedjs_page { background-color: #ffffff; }
@media print { @page { background-color: #ffffff; } }
</style>
</head>
<body>
<div class="running-header"><div class="print-header" style="text-align: center; max-width: 710px; margin: 0 auto;"><div style="text-align: center; padding: 4px 0; font-size: 18px; font-weight: bold;">Big news</div></div></div>
<div class="running-footer"><div class="print-footer" style="text-align: center; max-width: 710px; margin: 0 auto; background-color: #000000; color: #fafafa; padding: 8px 12px;">

<div style="font-weight: bold;"></div>
<div style="margin: 0; color: #fafafa;"></div>




</div></div>
<main>

<div class="print-block"><section class="hero" style="background-color: #ffffff; padding: 24px 16px; text-align: center; color: #1c1c1c;">

<h1 style="font-size: 28px; font-weight: 700; margin: 0 0 8px; color: #1c1c1c;">We&#39;re launching something new</h1>
<p style="font-size: 16px; color: #1c1c1c; margin: 0 0 18px;">A short, punchy sentence about why this matters.</p>
<a href="#" target="_blank" style="display: inline-block; padding: 10px 22px; background-color: #f1592a; color: #ffffff; text-decoration: none; font-weight: 600; border-radius: 4px;">Get the details</a>
</section></div>
<div class="print-block"><section class="article article-left" style="background-color: #ffffff; display: flex; flex-direction: row; gap: 12px; padding: 16px;">

<div style="flex: 1;"><h2 style="margin: 0 0 6px; font-size: 25px; color: #1c1c1c;">Why this matters</h2><p style="margin: 0 0 12px; font-size: 16px; color: #1c1c1c; white-space: pre-wrap;">A few sentences of supporting context. Lead with the customer benefit; explain the mechanism second.</p><a href="#" target="_blank" style="color: #f1592a; font-weight: 600; text-decoration: none;">Read the post</a></div>
</section></div>
<div class="print-block"><section class="cta-banner" style="background-color: #ffffff; padding: 20px 16px; text-align: center;">
<h2 style="margin: 0 0 6px; font-size: 25px; color: #1c1c1c;">Ready to try it?</h2>

<a href="#" target="_blank" style="display: inline-block; padding: 10px 20px; background-color: #f1592a; color: #ffffff; text-decoration: none; font-weight: 600; border-radius: 4px;">Get started</a>
</section></div>
</main>
</body>
</html>
