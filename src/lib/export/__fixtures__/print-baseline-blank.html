<style>
@page {
  size: A4 portrait;
  margin: 32mm 12mm 48mm 12mm;
  @top-center    { content: element(header-region); }
  @bottom-center { content: element(footer-region); }
}
@page :first { margin-top: 32mm; }
.print-footer { font-size: 11px; line-height: 1.35; }
.print-footer img { max-height: 40px; }

* { box-sizing: border-box; }
body { margin: 0; padding: 0; }

.running-header { position: running(header-region); }
.running-footer { position: running(footer-region); }
.running-header, .running-footer { display: none; }

.print-block {
  break-inside: avoid;
  page-break-inside: avoid;
  margin: 0 auto;
  max-width: 710px;
}

main { width: 100%; }
body { font-family: Arial, Helvetica Neue, Helvetica, sans-serif; font-size: 16px; color: #000000; background: #d0d0d0; }

@media print { @page { background-color: #d0d0d0; } }
